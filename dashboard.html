<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cookie Cleaner — Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 20px; font-weight: 700; color: #e94560; }
    header .subtitle { color: #8b949e; font-size: 13px; margin-top: 2px; }
    header .spacer { flex: 1; }
    #btn-clear {
      background: #21262d;
      border: 1px solid #30363d;
      color: #8b949e;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
    }
    #btn-clear:hover { border-color: #e94560; color: #e94560; }

    /* ── Layout ── */
    main { padding: 28px 32px; max-width: 1100px; }

    h2 {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #8b949e;
      margin-bottom: 14px;
    }

    /* ── Stat cards ── */
    .stat-cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 18px 20px;
    }
    .card .label { font-size: 12px; color: #8b949e; margin-bottom: 6px; }
    .card .value { font-size: 32px; font-weight: 700; color: #e94560; line-height: 1; }
    .card .sub { font-size: 11px; color: #484f58; margin-top: 4px; }

    /* ── Sections ── */
    section {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 20px 24px;
      margin-bottom: 20px;
    }

    /* ── 7-day bar chart ── */
    .day-chart {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      height: 120px;
      padding-bottom: 24px;
      position: relative;
    }
    .day-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100%;
      justify-content: flex-end;
      gap: 4px;
    }
    .day-bar {
      width: 100%;
      background: #e94560;
      border-radius: 3px 3px 0 0;
      min-height: 2px;
      transition: opacity 0.15s;
    }
    .day-bar:hover { opacity: 0.75; }
    .day-bar.today { background: #ff7096; }
    .day-count { font-size: 11px; color: #8b949e; }
    .day-label { font-size: 11px; color: #484f58; }

    /* ── Two-column layout ── */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    /* ── Horizontal bar rows ── */
    .hbar-list { display: flex; flex-direction: column; gap: 8px; }
    .hbar-row { display: flex; align-items: center; gap: 10px; }
    .hbar-label {
      width: 160px;
      font-size: 12px;
      font-family: monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #c9d1d9;
      flex-shrink: 0;
    }
    .hbar-track {
      flex: 1;
      height: 8px;
      background: #21262d;
      border-radius: 4px;
      overflow: hidden;
    }
    .hbar-fill {
      height: 100%;
      background: #e94560;
      border-radius: 4px;
      transition: width 0.3s ease;
    }
    .hbar-fill.alt { background: #3b82f6; }
    .hbar-count { font-size: 12px; color: #8b949e; width: 30px; text-align: right; flex-shrink: 0; }

    /* ── Log ── */
    #log-search {
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      padding: 7px 12px;
      font-size: 13px;
      margin-bottom: 12px;
      outline: none;
    }
    #log-search:focus { border-color: #e94560; }

    .log-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .log-table th {
      text-align: left;
      padding: 6px 10px;
      color: #484f58;
      border-bottom: 1px solid #21262d;
      font-weight: 500;
    }
    .log-table td {
      padding: 6px 10px;
      border-bottom: 1px solid #161b22;
      font-family: monospace;
    }
    .log-table tr:last-child td { border-bottom: none; }
    .log-table tr:hover td { background: #1c2128; }
    .cookie-name-cell { color: #e94560; }
    .domain-cell { color: #79c0ff; }
    .time-cell { color: #484f58; }

    .empty { color: #484f58; font-size: 13px; padding: 8px 0; }

    /* ── Pagination ── */
    .pagination {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      font-size: 12px;
      color: #8b949e;
    }
    .pagination button {
      background: #21262d;
      border: 1px solid #30363d;
      color: #8b949e;
      padding: 4px 10px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
    }
    .pagination button:disabled { opacity: 0.35; cursor: default; }
    .pagination button:not(:disabled):hover { border-color: #e94560; color: #e94560; }
    .pagination .spacer { flex: 1; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Cookie Cleaner</h1>
      <div class="subtitle">Tracking Cookie Dashboard</div>
    </div>
    <div class="spacer"></div>
    <button id="btn-clear">Clear All Data</button>
  </header>

  <main>
    <!-- Stat cards -->
    <div class="stat-cards">
      <div class="card">
        <div class="label">Cookies Removed</div>
        <div class="value" id="stat-total">—</div>
        <div class="sub">all time</div>
      </div>
      <div class="card">
        <div class="label">localStorage Blocked</div>
        <div class="value" id="stat-ls-total">—</div>
        <div class="sub">writes + purges</div>
      </div>
      <div class="card">
        <div class="label">This Week</div>
        <div class="value" id="stat-week">—</div>
        <div class="sub">cookies, last 7 days</div>
      </div>
      <div class="card">
        <div class="label">Top Offender</div>
        <div class="value" style="font-size:16px;padding-top:6px;" id="stat-top-domain">—</div>
        <div class="sub" id="stat-top-domain-count"></div>
      </div>
    </div>

    <!-- 7-day chart -->
    <section>
      <h2>Removals — Last 7 Days</h2>
      <div class="day-chart" id="daily-chart"></div>
    </section>

    <!-- Domain + Cookie name charts -->
    <div class="two-col">
      <section>
        <h2>Top Domains</h2>
        <div class="hbar-list" id="domain-chart"></div>
      </section>
      <section>
        <h2>Top Cookie Types</h2>
        <div class="hbar-list" id="name-chart"></div>
      </section>
    </div>

    <!-- localStorage blocked keys -->
    <section>
      <h2>Top Blocked localStorage Keys</h2>
      <div class="hbar-list" id="ls-chart"></div>
    </section>

    <!-- Full log -->
    <section>
      <h2>Activity Log</h2>
      <input type="search" id="log-search" placeholder="Filter by name or domain…">
      <table class="log-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Cookie Name</th>
            <th>Domain</th>
            <th>Time</th>
          </tr>
        </thead>
        <tbody id="log-body"></tbody>
      </table>
      <div class="pagination">
        <button id="btn-prev">← Prev</button>
        <span id="page-info">Page 1</span>
        <button id="btn-next">Next →</button>
        <span class="spacer"></span>
        <span id="log-count"></span>
      </div>
    </section>
  </main>

  <script src="dashboard.js"></script>
</body>
</html>
